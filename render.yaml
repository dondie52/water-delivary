services:
  - type: web
    name: water-delivary
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: API_KEY_21ST
        sync: false
      - key: GOOGLE_GENERATIVE_AI_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DRIVER_PASSWORD
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        value: https://water-delivary.onrender.com
